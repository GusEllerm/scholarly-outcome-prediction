experiment_name: baseline_regression
task_type: regression

data:
  processed_path: "data/processed/openalex_sample_100.parquet"
  dataset_id: openalex_sample_100

target:
  name: cited_by_count
  transform: log1p
  target_mode: proxy  # proxy = bootstrap; research = fixed-horizon (future)

features:
  numeric:
    - publication_year
    - referenced_works_count
    - authors_count
    - institutions_count
  categorical:
    - type
    - language
    - venue_name
    - primary_topic
    - open_access_is_oa

split:
  split_kind: random
  test_size: 0.2
  random_state: 42

model:
  name: baseline
  params: {}

evaluation:
  metrics:
    - rmse
    - mae
    - r2

