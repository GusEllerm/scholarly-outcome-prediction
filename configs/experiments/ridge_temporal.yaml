# Temporal pilot: Ridge baseline, same data/target/split as xgb_temporal.
experiment_name: ridge_temporal
task_type: regression

data:
  processed_path: "data/processed/openalex_temporal_articles_1000.parquet"
  dataset_id: openalex_temporal_articles_1000

target:
  name: cited_by_count
  transform: log1p
  target_mode: proxy

features:
  numeric:
    - publication_year
    - referenced_works_count
    - authors_count
    - institutions_count
  categorical:
    - type
    - language
    - venue_name
    - primary_topic
    - open_access_is_oa

split:
  split_kind: time
  time_column: publication_year
  train_year_end: 2018
  test_year_start: 2019
  test_size: 0.2
  random_state: 42

model:
  name: ridge
  params: {}

evaluation:
  metrics:
    - rmse
    - mae
    - r2
