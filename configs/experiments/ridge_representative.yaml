# Representative pilot: Ridge baseline, same data/target/split as xgb_representative.
experiment_name: ridge_representative
task_type: regression
benchmark:
  benchmark_mode: representative_proxy
  model_family: linear_baseline
  is_diagnostic_model: false

data:
  processed_path: "data/processed/openalex_representative_articles_1000.parquet"
  dataset_id: openalex_representative_articles_1000

target:
  name: cited_by_count
  transform: log1p
  target_mode: proxy

features:
  numeric:
    - publication_year
    - referenced_works_count
    - authors_count
    - institutions_count
  categorical:
    - type
    - language
    - venue_name
    - primary_topic
    - open_access_is_oa

split:
  split_kind: random
  test_size: 0.2
  random_state: 42

model:
  name: ridge
  params: {}

evaluation:
  metrics:
    - rmse
    - mae
    - r2
