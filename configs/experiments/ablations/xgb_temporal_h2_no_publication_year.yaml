# Ablation: XGBoost temporal H2 without publication_year.
# Use for ablation_review: compare to xgb_temporal_h2 (full).
experiment_name: xgb_temporal_h2_no_publication_year
task_type: regression
benchmark:
  benchmark_mode: temporal_h2
  model_family: tree_model
  is_diagnostic_model: false
ablation:
  name: no_publication_year
  features_removed: [publication_year]
  ablation_type: coarse

data:
  processed_path: "data/processed/openalex_temporal_articles_1000.parquet"
  dataset_id: openalex_temporal_articles_1000

target:
  name: citations_within_2_calendar_years
  target_mode: calendar_horizon
  source: counts_by_year
  horizon_years: 2
  include_publication_year: true
  transform: log1p

features:
  numeric:
    - referenced_works_count
    - authors_count
    - institutions_count
  categorical:
    - type
    - language
    - venue_name
    - primary_topic
    - open_access_is_oa

split:
  split_kind: time
  time_column: publication_year
  train_year_end: 2018
  test_year_start: 2019
  test_size: 0.2
  random_state: 42

model:
  name: xgboost
  params:
    n_estimators: 50
    max_depth: 4
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    objective: reg:squarederror
    tree_method: auto
    random_state: 42

evaluation:
  metrics:
    - rmse
    - mae
    - r2
