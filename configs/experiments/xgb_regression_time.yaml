# XGBoost regression with time-based split (train on earlier years, test on later).
# Use with data from openalex_pilot_articles.
experiment_name: xgb_regression_time
task_type: regression
benchmark:
  benchmark_mode: temporal_proxy
  model_family: tree_model
  is_diagnostic_model: false

data:
  processed_path: "data/processed/openalex_pilot_articles.parquet"
  dataset_id: openalex_pilot_articles

target:
  name: cited_by_count
  transform: log1p
  target_mode: proxy

features:
  numeric:
    - publication_year
    - referenced_works_count
    - authors_count
    - institutions_count
  categorical:
    - type
    - language
    - venue_name
    - primary_topic
    - open_access_is_oa

split:
  split_kind: time
  time_column: publication_year
  test_size: 0.2
  random_state: 42

model:
  name: xgboost
  params:
    n_estimators: 50
    max_depth: 4
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    objective: reg:squarederror
    tree_method: auto
    random_state: 42

evaluation:
  metrics:
    - rmse
    - mae
    - r2
